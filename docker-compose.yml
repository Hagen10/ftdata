  solr:
    build:
      context: ./vectors
      dockerfile: docker/solr.Dockerfile
    ports:
      - "8983:8983"
    command:
      - solr-precreate
      - vector_test
      - /opt/solr/server/solr/configsets/vector_config

  vectorapi:
    build:
      context: ./vectors
      dockerfile: docker/vectorapi.Dockerfile
    ports:
      - "8000:8000"
    environment:
      SOLR_URL: "http://solr:8983/solr/vector_test/query"
    depends_on:
      - solr
    
  indexer:
    build:
      context: ./vectors
      dockerfile: docker/indexer.Dockerfile
    depends_on:
      - solr